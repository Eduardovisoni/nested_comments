spring.application.name=nested-comments

app.tree-strategy=custom
app.storage=memory

# Contract-first: Swagger UI sirve el openapi.yaml estatico (no el escaneado por reflexion).
# Dejamos /v3/api-docs habilitado porque springdoc requiere ese endpoint para registrar la UI,
# pero la UI carga el yaml de /openapi.yaml; el /v3/api-docs queda como vista secundaria.
springdoc.swagger-ui.url=/openapi.yaml
springdoc.swagger-ui.disable-swagger-default-url=true

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration
