services:
  postgres:
    image: postgres:16-alpine
    container_name: trees-postgres
    environment:
      POSTGRES_DB: trees
      POSTGRES_USER: trees
      POSTGRES_PASSWORD: trees123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    container_name: trees-neo4j
    environment:
      NEO4J_AUTH: neo4j/trees123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

volumes:
  postgres-data:
  neo4j-data:
